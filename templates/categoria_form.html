{% extends 'base.html' %}
{% block title %}{{ accion }} Categoría{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h2><i class="bi bi-tag me-2" style="color:#c8a96e"></i>{{ accion }} Categoría</h2>
    <a href="{{ url_for('categorias') }}" class="btn-editar"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>
  <div class="form-card">
    <form method="POST">
      <div class="mb-4">
        <label class="form-label">Nombre *</label>
        <input type="text" name="nombre" class="form-control" required
               value="{{ categoria['Nombre'] if categoria else '' }}"
               placeholder="Ej: Carnes, Guisos...">
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn-acento"><i class="bi bi-check-lg"></i> Guardar</button>
        <a href="{{ url_for('categorias') }}" class="btn-editar">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
