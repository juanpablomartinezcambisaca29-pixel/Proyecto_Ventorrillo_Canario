{% extends 'base.html' %}
{% block title %}{{ accion }} Mesa{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h2><i class="bi bi-grid-3x3 me-2" style="color:#c8a96e"></i>{{ accion }} Mesa</h2>
    <a href="{{ url_for('mesas') }}" class="btn-editar"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>
  <div class="form-card">
    <form method="POST">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Número de mesa *</label>
          <input type="number" name="numero" class="form-control" required min="1"
                 value="{{ mesa['Número_mesa'] if mesa else '' }}" placeholder="Ej: 1">
        </div>
        <div class="col-md-6">
          <label class="form-label">Capacidad *</label>
          <input type="number" name="capacidad" class="form-control" required min="1"
                 value="{{ mesa['Capacidad'] if mesa else '' }}" placeholder="Ej: 4">
        </div>
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn-acento"><i class="bi bi-check-lg"></i> Guardar</button>
        <a href="{{ url_for('mesas') }}" class="btn-editar">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
