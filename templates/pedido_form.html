{% extends 'base.html' %}
{% block title %}{{ accion }} Pedido{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h2><i class="bi bi-receipt me-2" style="color:#c8a96e"></i>{{ accion }} Pedido</h2>
    <a href="{{ url_for('pedidos') }}" class="btn-editar"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>
  <div class="form-card">
    <form method="POST">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Mesa *</label>
          <select name="id_mesa" class="form-select" required>
            <option value="">Seleccionar mesa...</option>
            {% for m in mesas %}
            <option value="{{ m['Id_mesa'] }}"
              {{ 'selected' if pedido and pedido['Id_mesa'] == m['Id_mesa'] else '' }}>
              Mesa {{ m['Número_mesa'] }} (cap. {{ m['Capacidad'] }})
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Estado *</label>
          <select name="estado" class="form-select" required>
            <option value="Pendiente"  {{ 'selected' if pedido and pedido['Estado'] == 'Pendiente' else '' }}>Pendiente</option>
            <option value="Entregado"  {{ 'selected' if pedido and pedido['Estado'] == 'Entregado' else '' }}>Entregado</option>
            <option value="Cancelado"  {{ 'selected' if pedido and pedido['Estado'] == 'Cancelado' else '' }}>Cancelado</option>
          </select>
        </div>
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn-acento"><i class="bi bi-check-lg"></i> Guardar</button>
        <a href="{{ url_for('pedidos') }}" class="btn-editar">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
