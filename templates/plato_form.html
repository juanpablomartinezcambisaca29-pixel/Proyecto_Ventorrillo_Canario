{% extends 'base.html' %}
{% block title %}{{ accion }} Plato{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h2><i class="bi bi-egg-fried me-2" style="color:#c8a96e"></i>{{ accion }} Plato</h2>
    <a href="{{ url_for('platos') }}" class="btn-editar"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>
  <div class="form-card">
    <form method="POST">
      <div class="mb-4">
        <label class="form-label">Nombre *</label>
        <input type="text" name="nombre" class="form-control" required
               value="{{ plato['Nombre'] if plato else '' }}"
               placeholder="Ej: Carne de cabra guisada">
      </div>
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Precio (€) *</label>
          <input type="number" name="precio" step="0.01" min="0" class="form-control" required
                 value="{{ plato['Precio'] if plato else '' }}" placeholder="0.00">
        </div>
        <div class="col-md-6">
          <label class="form-label">Categoría *</label>
          <select name="id_categoria" class="form-select" required>
            <option value="">Seleccionar...</option>
            {% for c in categorias %}
            <option value="{{ c['Id_categoría'] }}"
              {{ 'selected' if plato and plato['Id_categoría'] == c['Id_categoría'] else '' }}>
              {{ c['Nombre'] }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn-acento"><i class="bi bi-check-lg"></i> Guardar</button>
        <a href="{{ url_for('platos') }}" class="btn-editar">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
