{% extends 'base.html' %}
{% block title %}{{ accion }} Detalle{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h2><i class="bi bi-list-ul me-2" style="color:#c8a96e"></i>{{ accion }} Detalle</h2>
    <a href="{{ url_for('detalles') }}" class="btn-editar"><i class="bi bi-arrow-left"></i> Volver</a>
  </div>
  <div class="form-card">
    <form method="POST">
      <div class="mb-4">
        <label class="form-label">Pedido *</label>
        <select name="id_pedido" class="form-select" required>
          <option value="">Seleccionar pedido...</option>
          {% for p in pedidos %}
          <option value="{{ p['Id_pedido'] }}"
            {{ 'selected' if detalle and detalle['Id_pedido'] == p['Id_pedido'] else '' }}>
            Pedido #{{ p['Id_pedido'] }} — {{ p['Estado'] }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label">Plato *</label>
        <select name="id_plato" class="form-select" required>
          <option value="">Seleccionar plato...</option>
          {% for p in platos %}
          <option value="{{ p['Id_plato'] }}"
            {{ 'selected' if detalle and detalle['Id_plato'] == p['Id_plato'] else '' }}>
            {{ p['Nombre'] }} — {{ '%.2f'|format(p['Precio']|float) }} €
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-4">
        <label class="form-label">Cantidad *</label>
        <input type="number" name="cantidad" class="form-control" required min="1"
               value="{{ detalle['Cantidad'] if detalle else '1' }}">
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn-acento"><i class="bi bi-check-lg"></i> Guardar</button>
        <a href="{{ url_for('detalles') }}" class="btn-editar">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
